name: Deploy

# ATENCIÓN: No usar `if: ${{ secrets.* }}` en este workflow 
# si el secret no existe en el repo — GitHub Actions rechaza 
# el workflow al instante con 0 jobs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: inventario-itu
  REGISTRY: ghcr.io

jobs:
  deploy-core:
    name: Core — desplegar cluster sin datos
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name (GHCR exige minúsculas)
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Variables de imagen
        run: |
          echo "IMAGE_WEB=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/inventario-web:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_BACKEND=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/inventario-backend:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/inventario-web:latest

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/inventario-backend:latest

      - name: Secret para pull de GHCR
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Namespace
        run: kubectl apply -f k8s/namespace/

      - name: MongoDB (motor únicamente)
        run: |
          kubectl apply -f k8s/mongo/deployment.yaml
          kubectl apply -f k8s/mongo/service.yaml
          kubectl apply -f k8s/mongo/pvc.yaml

      - name: Backend
        run: kubectl apply -f k8s/backend/

      - name: Frontend
        run: kubectl apply -f k8s/frontend/

      - name: Network Policies
        run: kubectl apply -f k8s/network-policies/

      - name: Actualizar imágenes
        run: |
          kubectl set image deployment/inventario-web \
            web="${{ env.IMAGE_WEB }}" \
            -n "${{ env.NAMESPACE }}"
          kubectl set image deployment/inventario-backend \
            backend="${{ env.IMAGE_BACKEND }}" \
            -n "${{ env.NAMESPACE }}"

      - name: Esperar rollouts (mongo → backend → frontend)
        run: |
          kubectl rollout status deployment/inventario-db -n "${{ env.NAMESPACE }}" --timeout=120s
          kubectl rollout status deployment/inventario-backend -n "${{ env.NAMESPACE }}" --timeout=180s
          kubectl rollout status deployment/inventario-web -n "${{ env.NAMESPACE }}" --timeout=120s

      - name: Configurar reglas iptables (host)
        run: sudo bash k8s/setup-host-networking.sh

      - name: Smoke test
        run: |
          sleep 5
          POD=$(kubectl get pod -l app=inventario-backend -n "${{ env.NAMESPACE }}" -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n "${{ env.NAMESPACE }}" -- sh -c "
            wget -q -O - http://localhost:3001/health | grep -q status && echo 'SMOKE OK' || (echo 'SMOKE FAILED' && exit 1)
          "

      - name: Resumen core
        run: |
          echo "Core desplegado en namespace ${{ env.NAMESPACE }}"
          kubectl get pods,svc -n "${{ env.NAMESPACE }}"

  seed-data:
    name: Seed — poblar SQL Server y MongoDB
    needs: deploy-core
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Seed SQL Server
        run: node scripts/bootstrap.mjs
        working-directory: backend
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER != '' && secrets.SQL_SERVER || '192.168.1.20' }}
          SQL_PORT: ${{ secrets.SQL_PORT != '' && secrets.SQL_PORT || '1433' }}
          SQL_USER: ${{ secrets.SQL_USER != '' && secrets.SQL_USER || 'sa' }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD != '' && secrets.SQL_PASSWORD || 'Mysql123' }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE != '' && secrets.SQL_DATABASE || 'inventario_itu' }}
          SQL_ENCRYPT: ${{ secrets.SQL_ENCRYPT != '' && secrets.SQL_ENCRYPT || 'false' }}

      - name: Seed MongoDB (ConfigMap + Job idempotente)
        run: |
          kubectl apply -f k8s/mongo/configmap.yaml
          kubectl apply -f k8s/mongo/seed-job.yaml
          kubectl wait --for=condition=complete job/mongo-seed -n "${{ env.NAMESPACE }}" --timeout=120s
          echo "=== Logs del job mongo-seed ==="
          kubectl logs job/mongo-seed -n "${{ env.NAMESPACE }}"

      - name: Resumen seed
        run: echo "✅ Seed completado — SQL Server y MongoDB poblados"
