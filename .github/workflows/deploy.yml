# Despliegue en Minikube vía runner self-hosted (VM del cluster).
# Requisito: registrar un runner en GitHub con label "self-hosted" en la VM Minikube.
#
# Flujo: build → push GHCR → kubectl apply (incluye NetworkPolicies) → rollout

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: inventario-itu
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build, push y desplegar
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Variables de imagen
        run: |
          echo "IMAGE_WEB=${{ env.REGISTRY }}/${{ github.repository }}/inventario-web:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_BACKEND=${{ env.REGISTRY }}/${{ github.repository }}/inventario-backend:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run database schema
        if: ${{ secrets.SQL_SERVER != '' }}
        run: node scripts/bootstrap.mjs
        working-directory: backend
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_PORT: ${{ secrets.SQL_PORT != '' && secrets.SQL_PORT || '1433' }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE != '' && secrets.SQL_DATABASE || 'inventario_itu' }}
          SQL_ENCRYPT: ${{ secrets.SQL_ENCRYPT != '' && secrets.SQL_ENCRYPT || 'false' }}

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}
            ${{ env.REGISTRY }}/${{ github.repository }}/inventario-web:latest

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}
            ${{ env.REGISTRY }}/${{ github.repository }}/inventario-backend:latest

      - name: Secret para pull de GHCR
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Aplicar manifiestos
        run: |
          kubectl apply -f k8s/namespace/
          kubectl apply -f k8s/mongo/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/network-policies/

      - name: Actualizar imágenes
        run: |
          kubectl set image deployment/inventario-web \
            web="${{ env.IMAGE_WEB }}" \
            -n "${{ env.NAMESPACE }}"
          kubectl set image deployment/inventario-backend \
            backend="${{ env.IMAGE_BACKEND }}" \
            -n "${{ env.NAMESPACE }}"

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/inventario-backend -n "${{ env.NAMESPACE }}" --timeout=180s
          kubectl rollout status deployment/inventario-web -n "${{ env.NAMESPACE }}" --timeout=180s

      - name: Smoke test
        run: |
          sleep 5
          POD=$(kubectl get pod -l app=inventario-backend -n "${{ env.NAMESPACE }}" -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n "${{ env.NAMESPACE }}" -- sh -c "
            curl -sf http://localhost:3001/health | grep -q status && echo 'SMOKE OK' || (echo 'SMOKE FAILED' && exit 1)
          "

      - name: Resumen
        run: |
          echo "Desplegado en namespace ${{ env.NAMESPACE }}"
          kubectl get pods,svc -n "${{ env.NAMESPACE }}"
