name: Deploy Copy 6

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: inventario-itu
  REGISTRY: ghcr.io

jobs:
  deploy-core:
    name: Core — desplegar cluster sin datos
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Variables de imagen
        run: |
          echo "IMAGE_WEB=${{ env.REGISTRY }}/${{ github.repository }}/inventario-web:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_BACKEND=${{ env.REGISTRY }}/${{ github.repository }}/inventario-backend:${{ github.sha }}" >> "$GITHUB_ENV"
      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}
            ${{ env.REGISTRY }}/${{ github.repository }}/inventario-web:latest
      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}
            ${{ env.REGISTRY }}/${{ github.repository }}/inventario-backend:latest
      - name: Resumen core
        run: echo "Done"
