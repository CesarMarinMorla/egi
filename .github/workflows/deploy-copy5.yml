name: Deploy Copy 5

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: inventario-itu
  REGISTRY: ghcr.io

jobs:
  deploy-core:
    name: Core — desplegar cluster sin datos
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Variables de imagen
        run: |
          echo "IMAGE_WEB=${{ env.REGISTRY }}/${{ github.repository }}/inventario-web:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_BACKEND=${{ env.REGISTRY }}/${{ github.repository }}/inventario-backend:${{ github.sha }}" >> "$GITHUB_ENV"
      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
