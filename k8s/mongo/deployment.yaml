apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-db
  namespace: inventario-itu
  labels:
    app: inventario-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventario-db
  template:
    metadata:
      labels:
        app: inventario-db
    spec:
      containers:
        - name: mongo
          image: mongo:4.4
          imagePullPolicy: IfNotPresent
          args: ["--auth"]
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "egi_user"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "EgiMongo2026!"
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: inventario-db-pvc
