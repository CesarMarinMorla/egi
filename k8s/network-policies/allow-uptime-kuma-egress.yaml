# Permite a Uptime Kuma monitorear servicios internos y externos.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-uptime-kuma-egress
  namespace: inventario-itu
spec:
  podSelector:
    matchLabels:
      app: inventario-uptime-kuma
  policyTypes:
    - Egress
    - Ingress
  ingress:
    - ports:
        - port: 3001
  egress:
    - {}
