apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-backend
  namespace: inventario-itu
  labels:
    app: inventario-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventario-backend
  template:
    metadata:
      labels:
        app: inventario-backend
    spec:
      containers:
        - name: backend
          image: inventario-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: inventario-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
