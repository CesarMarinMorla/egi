apiVersion: v1
kind: Secret
metadata:
  name: inventario-backend-secret
  namespace: inventario-itu
  labels:
    app: inventario-backend
type: Opaque
stringData:
  PORT: "3001"
  JWT_SECRET: dev-secret-change-me

  # ── Modo ──────────────────────────────────────────
  # MOCK_MODE: "true"
  MOCK_MODE: "false"    # ← modo real activado (requiere SQL + Mongo + AD abajo)

  # ── SQL Server (solo si MOCK_MODE=false) ──────────
  SQL_SERVER: "192.168.1.20"
  SQL_PORT: "1433"
  SQL_USER: "sa"
  SQL_PASSWORD: "Mysql123"
  SQL_DATABASE: "inventario_itu"
  SQL_ENCRYPT: "false"
  SQL_TRUST_SERVER_CERTIFICATE: "true"

  # ── MongoDB (solo si MOCK_MODE=false) ─────────────
  MONGO_URI: "mongodb://egi_user:EgiMongo2026!@inventario-db:27017/inventario_itu?authSource=admin"
  MONGO_DB_NAME: "inventario_itu"

  # ── Active Directory / LDAP (solo si MOCK_MODE=false) ──
  LDAP_URL: "ldap://192.168.1.10:389"
  LDAP_BIND_DN: "CN=svc_egi_ldap,OU=EGI,DC=itu,DC=local"
  LDAP_BIND_PASSWORD: "EgiLdap2026!"
  LDAP_SEARCH_BASE: "dc=itu,dc=local"
  LDAP_SEARCH_FILTER: "(sAMAccountName={username})"
