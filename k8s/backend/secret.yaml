apiVersion: v1
kind: Secret
metadata:
  name: inventario-backend-secret
  namespace: inventario-itu
  labels:
    app: inventario-backend
type: Opaque
stringData:
  PORT: "3001"
  JWT_SECRET: dev-secret-change-me

  # ── Modo ──────────────────────────────────────────
  MOCK_MODE: "true"
  # MOCK_MODE: "false"    # ← descomentar para modo real (requiere SQL + Mongo abajo)

  # ── SQL Server (solo si MOCK_MODE=false) ──────────
  SQL_SERVER: "localhost"
  SQL_PORT: "1433"
  SQL_USER: "sa"
  SQL_PASSWORD: "Mysql123"
  SQL_DATABASE: "inventario_itu"

  # ── MongoDB (solo si MOCK_MODE=false) ─────────────
  # MONGO_URI: "mongodb://inventario-db:27017"
  # MONGO_DB_NAME: "inventario"
