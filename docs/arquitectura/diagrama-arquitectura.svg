<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Diagrama de arquitectura EGI — Inventario ITU</title>
<desc>Arquitectura con PC anfitriona, VirtualBox con 4 VMs (pfSense, Active Directory, SQL Server, Lubuntu con Minikube), red interna 192.168.1.0/24 y NetworkPolicies de Kubernetes.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
    .c-gray-rect { fill: #F1EFE8; stroke: #888780; }
    .c-blue-rect  { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue-text  { fill: #0C447C; }
    .c-coral-rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral-text { fill: #4A1B0C; }
    .c-purple-rect{ fill: #EEEDFE; stroke: #534AB7; }
    .c-purple-text{ fill: #26215C; }
    .c-amber-rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber-text { fill: #412402; }
    .c-teal-rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal-text  { fill: #04342C; }
    .c-green-rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green-text { fill: #173404; }
    @media (prefers-color-scheme: dark) {
      .th { fill: #D3D1C7; }
      .ts { fill: #888780; }
      .c-gray-rect  { fill: #444441; stroke: #888780; }
      .c-blue-rect  { fill: #0C447C; stroke: #85B7EB; }
      .c-blue-text  { fill: #B5D4F4; }
      .c-coral-rect { fill: #712B13; stroke: #F0997B; }
      .c-coral-text { fill: #F5C4B3; }
      .c-purple-rect{ fill: #3C3489; stroke: #AFA9EC; }
      .c-purple-text{ fill: #CECBF6; }
      .c-amber-rect { fill: #633806; stroke: #EF9F27; }
      .c-amber-text { fill: #FAC775; }
      .c-teal-rect  { fill: #085041; stroke: #5DCAA5; }
      .c-teal-text  { fill: #9FE1CB; }
      .c-green-rect { fill: #27500A; stroke: #97C459; }
      .c-green-text { fill: #C0DD97; }
    }
  </style>
</defs>

<!-- PC anfitriona -->
<rect x="20" y="20" width="640" height="700" rx="16" class="c-gray-rect" stroke-width="0.5"/>
<text class="th" x="340" y="46" text-anchor="middle">PC anfitriona — Windows + VirtualBox</text>
<text class="ts" x="340" y="63" text-anchor="middle">Red interna: 192.168.1.0/24</text>

<!-- Internet / LAN -->
<rect x="220" y="74" width="240" height="38" rx="8" class="c-blue-rect" stroke-width="0.5"/>
<text class="th c-blue-text" x="340" y="90" text-anchor="middle">Internet / LAN del aula</text>
<text class="ts c-blue-text" x="340" y="104" text-anchor="middle">Tráfico externo → puerto 80</text>

<!-- Flecha internet → pfSense -->
<line x1="340" y1="112" x2="340" y2="140" class="arr" stroke="#185FA5" marker-end="url(#arrow)"/>

<!-- VM1: pfSense -->
<rect x="200" y="140" width="280" height="52" rx="8" class="c-coral-rect" stroke-width="0.5"/>
<text class="th c-coral-text" x="340" y="161" text-anchor="middle">VM1 — pfSense (firewall)</text>
<text class="ts c-coral-text" x="340" y="178" text-anchor="middle">WAN: IP aula · LAN: 192.168.1.254 · NAT → :30080</text>

<!-- Flechas pfSense → VMs -->
<line x1="270" y1="192" x2="140" y2="240" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>
<line x1="340" y1="192" x2="340" y2="240" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>
<line x1="410" y1="192" x2="530" y2="240" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>

<!-- VM2: Active Directory -->
<rect x="38" y="240" width="198" height="56" rx="8" class="c-purple-rect" stroke-width="0.5"/>
<text class="th c-purple-text" x="137" y="261" text-anchor="middle">VM2 — Active Directory</text>
<text class="ts c-purple-text" x="137" y="276" text-anchor="middle">Windows Server</text>
<text class="ts c-purple-text" x="137" y="291" text-anchor="middle">192.168.1.10 · puerto 389 (LDAP)</text>

<!-- VM3: SQL Server -->
<rect x="242" y="240" width="196" height="56" rx="8" class="c-amber-rect" stroke-width="0.5"/>
<text class="th c-amber-text" x="340" y="261" text-anchor="middle">VM3 — SQL Server</text>
<text class="ts c-amber-text" x="340" y="276" text-anchor="middle">Windows Server · ITULAB</text>
<text class="ts c-amber-text" x="340" y="291" text-anchor="middle">192.168.1.20 · puerto 1433 · DB: inventario_itu</text>

<!-- VM4: Lubuntu + Minikube -->
<rect x="38" y="336" width="604" height="360" rx="12" class="c-teal-rect" stroke-width="0.5"/>
<text class="th c-teal-text" x="340" y="358" text-anchor="middle">VM4 — Lubuntu · 192.168.1.50</text>
<text class="ts c-teal-text" x="340" y="374" text-anchor="middle">Minikube (CNI: Calico) · namespace: inventario-itu · NodePort :30080</text>

<!-- NetworkPolicies banner -->
<rect x="52" y="384" width="580" height="24" rx="6" class="c-teal-rect" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts c-teal-text" x="340" y="400" text-anchor="middle">NetworkPolicies: deny-all-default + reglas explícitas (Calico)</text>

<!-- Pod: frontend -->
<rect x="60" y="420" width="168" height="62" rx="8" class="c-blue-rect" stroke-width="0.5"/>
<text class="th c-blue-text" x="144" y="442" text-anchor="middle">Pod: frontend</text>
<text class="ts c-blue-text" x="144" y="458" text-anchor="middle">React + nginx</text>
<text class="ts c-blue-text" x="144" y="473" text-anchor="middle">NodePort 30080</text>

<!-- Pod: backend -->
<rect x="256" y="420" width="168" height="62" rx="8" class="c-teal-rect" stroke-width="0.5"/>
<text class="th c-teal-text" x="340" y="442" text-anchor="middle">Pod: backend</text>
<text class="ts c-teal-text" x="340" y="458" text-anchor="middle">Node.js · Express</text>
<text class="ts c-teal-text" x="340" y="473" text-anchor="middle">ClusterIP :3001</text>

<!-- Pod: MongoDB -->
<rect x="452" y="420" width="168" height="62" rx="8" class="c-green-rect" stroke-width="0.5"/>
<text class="th c-green-text" x="536" y="442" text-anchor="middle">Pod: MongoDB</text>
<text class="ts c-green-text" x="536" y="458" text-anchor="middle">MongoDB 7</text>
<text class="ts c-green-text" x="536" y="473" text-anchor="middle">ClusterIP :27017</text>

<!-- frontend → backend -->
<line x1="228" y1="451" x2="254" y2="451" stroke="#0F6E56" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="241" y="444" text-anchor="middle" font-size="9">NP ✓</text>

<!-- backend → mongo -->
<line x1="424" y1="451" x2="450" y2="451" stroke="#0F6E56" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="437" y="444" text-anchor="middle" font-size="9">NP ✓</text>

<!-- backend → SQL Server -->
<path d="M340 482 L340 558" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="534" font-size="9">NP ✓ egress :1433</text>

<!-- backend → AD -->
<path d="M270 482 L270 560 L137 560 L137 298" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="84" y="556" font-size="9">NP ✓ egress :389</text>

<!-- Leyenda -->
<rect x="60" y="598" width="580" height="84" rx="8" class="c-gray-rect" stroke-width="0.5"/>
<text class="th" x="80" y="618">Leyenda</text>
<line x1="80" y1="632" x2="118" y2="632" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="124" y="636">Tráfico permitido por NetworkPolicy</text>
<line x1="80" y1="652" x2="118" y2="652" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="124" y="656">Egress a VM externa (IP fija)</text>
<line x1="80" y1="672" x2="118" y2="672" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="124" y="676">Tráfico externo (internet / LAN)</text>
<text class="ts" x="350" y="636">NP ✓ = regla de NetworkPolicy explícita activa</text>
<text class="ts" x="350" y="656">deny-all-default = bloquea todo lo no listado</text>
<text class="ts" x="350" y="676">ClusterIP = no accesible desde fuera del cluster</text>
</svg>
